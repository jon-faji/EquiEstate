{% load static %}
<header class="h-16 bg-white/80 dark:bg-slate-900/50 border-b border-slate-200 dark:border-slate-800/80 backdrop-blur-sm flex items-center justify-between px-6 shrink-0 sticky top-0 z-30 transition-colors duration-200" x-data="{ userMenuOpen: false }">
    
    <div class="flex items-center space-x-2">
        <span class="text-xs font-medium text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-800 px-2.5 py-1 rounded-md border border-slate-200 dark:border-slate-700/60 select-none transition-transform duration-200 hover:scale-102">v1.0.0 Stable</span>
    </div>

    <div class="flex items-center space-x-4">
        
        <button id="theme-toggle" type="button" class="p-2 text-slate-500 dark:text-slate-400 hover:text-indigo-600 dark:hover:text-white transition-all duration-200 rounded-lg cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800/40 focus:outline-none hover:rotate-45 active:scale-90" aria-label="Toggle system color theme">
            <i data-lucide="moon" class="w-4 h-4 text-indigo-500 block dark:hidden"></i>
            <i data-lucide="sun" class="w-4 h-4 text-amber-400 hidden dark:block"></i>
        </button>
        
        <div class="h-4 w-px bg-slate-200 dark:bg-slate-800"></div>

        <div class="relative">
            
            <button @click="userMenuOpen = !userMenuOpen" 
                    @click.outside="userMenuOpen = false"
                    class="flex items-center space-x-3 transition-all duration-200 ease-out focus:outline-none hover:-translate-y-0.5 active:translate-y-0 active:scale-95 group"
                    aria-haspopup="true"
                    :aria-expanded="userMenuOpen">
                
                <div class="text-right hidden sm:block">
                    <p class="text-xs font-semibold text-slate-900 dark:text-white tracking-tight group-hover:text-indigo-600 dark:group-hover:text-indigo-400 transition-colors duration-150">
                        {% if request.user.is_authenticated %}{{ request.user.username }}{% else %}System Admin{% endif %}
                    </p>
                    <p class="text-[10px] text-slate-500 dark:text-slate-400 font-mono">Portfolio Auditor</p>
                </div>
                
                {% if request.user.is_authenticated and request.user.profile.avatar %}
                    <img src="{{ request.user.profile.avatar.url }}" alt="Avatar" class="h-8 w-8 rounded-full border border-slate-200 dark:border-slate-700 object-cover shadow-sm transition-transform duration-200 group-hover:scale-105 group-hover:shadow-indigo-500/10">
                {% else %}
                    <div class="h-8 w-8 rounded-full border border-slate-200 dark:border-slate-700 bg-indigo-600 text-white flex items-center justify-center text-xs font-bold shadow-sm select-none transition-transform duration-200 group-hover:scale-105 group-hover:shadow-indigo-500/10">
                        {% if request.user.is_authenticated %}{{ request.user.username|slice:":1"|upper }}{% else %}A{% endif %}
                    </div>
                {% endif %}
            </button>

            <div x-show="userMenuOpen"
                 x-transition:enter="transition ease-out duration-150"
                 x-transition:enter-start="transform opacity-0 scale-95 -translate-y-1"
                 x-transition:enter-end="transform opacity-100 scale-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-100"
                 x-transition:leave-start="transform opacity-100 scale-100 translate-y-0"
                 x-transition:leave-end="transform opacity-0 scale-95 -translate-y-1"
                 class="absolute right-0 mt-2.5 w-48 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-2xl p-1.5 z-40"
                 style="display: none;">
                
                <div class="px-3 py-2 border-b border-slate-100 dark:border-slate-800/60 sm:hidden">
                    <p class="text-xs font-semibold text-slate-900 dark:text-white truncate">
                        {% if request.user.is_authenticated %}{{ request.user.username }}{% else %}System Admin{% endif %}
                    </p>
                    <p class="text-[10px] text-slate-400 dark:text-slate-500 font-mono truncate">Portfolio Auditor</p>
                </div>

                <a href="{% url 'profile_view' %}" class="group flex items-center gap-2.5 w-full px-3 py-2 text-xs font-medium text-slate-700 dark:text-slate-300 hover:text-slate-900 hover:bg-slate-100 dark:hover:text-white dark:hover:bg-slate-800/60 rounded-lg transition-all duration-150 ease-out hover:translate-x-1">
                    <i data-lucide="settings" class="size-3.5 text-slate-500 dark:text-slate-400 transition-transform duration-200 group-hover:rotate-45"></i>
                    <span>Profile Settings</span>
                </a>

                <a href="/admin/" class="group flex items-center gap-2.5 w-full px-3 py-2 text-xs font-medium text-slate-700 dark:text-slate-300 hover:text-slate-900 hover:bg-slate-100 dark:hover:text-white dark:hover:bg-slate-800/60 rounded-lg transition-all duration-150 ease-out hover:translate-x-1">
                    <i data-lucide="shield" class="size-3.5 text-slate-500 dark:text-slate-400 transition-transform duration-200 group-hover:scale-110"></i>
                    <span>System Admin</span>
                </a>

                <div class="h-px bg-slate-100 dark:bg-slate-800/60 my-1"></div>

                <form method="POST" action="{% url 'account_logout' %}" class="block w-full m-0">
                    {% csrf_token %}
                    <button type="submit" onclick="return confirm('Are you sure you want to log out?')" class="group flex items-center gap-2.5 w-full px-3 py-2 text-xs font-medium text-rose-600 dark:text-rose-400 hover:bg-rose-50 dark:hover:bg-rose-500/10 rounded-lg transition-all duration-150 ease-out text-left cursor-pointer hover:translate-x-1">
                        <i data-lucide="log-out" class="size-3.5 transition-transform duration-200 group-hover:-translate-x-0.5"></i>
                        <span>Logout</span>
                    </button>
                </form>

            </div>
        </div>
    </div>
</header>

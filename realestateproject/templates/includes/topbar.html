{% load static %}
<header class="h-16 bg-slate-900/50 border-b border-slate-800/80 backdrop-blur-sm flex items-center justify-between px-6 shrink-0 sticky top-0 z-30" x-data="{ userMenuOpen: false }">
    <div class="flex items-center space-x-2">
        <span class="text-xs font-medium text-slate-400 bg-slate-800 px-2.5 py-1 rounded-md border border-slate-700/60">v1.0.0 Stable</span>
    </div>

    <div class="flex items-center space-x-4">
        <div class="p-2 text-slate-400 hover:text-white transition rounded-lg cursor-pointer hover:bg-slate-800/40">
            <i data-lucide="moon" class="w-4 h-4 text-indigo-400"></i>
        </div>
        
        <div class="h-4 w-px bg-slate-800"></div>

        <div class="relative">
            <button @click="userMenuOpen = !userMenuOpen" 
                    @click.outside="userMenuOpen = false"
                    class="flex items-center space-x-3 hover:opacity-90 transition focus:outline-none"
                    aria-haspopup="true"
                    :aria-expanded="userMenuOpen">
                <div class="text-right hidden sm:block">
                    <p class="text-xs font-semibold text-white tracking-tight">
                        {% if request.user.is_authenticated %}{{ request.user.username }}{% else %}System Admin{% endif %}
                    </p>
                    <p class="text-[10px] text-slate-400 font-mono">Portfolio Auditor</p>
                </div>
                <img src="{% static 'img/placeholder-user.jpg' %}" alt="Avatar" class="h-8 w-8 rounded-full border border-slate-700 object-cover shadow-sm">
            </button>

            <div x-show="userMenuOpen"
                 x-transition:enter="transition ease-out duration-100"
                 x-transition:enter-start="transform opacity-0 scale-95"
                 x-transition:enter-end="transform opacity-100 scale-100"
                 x-transition:leave="transition ease-in duration-75"
                 x-transition:leave-start="transform opacity-100 scale-100"
                 x-transition:leave-end="transform opacity-0 scale-95"
                 class="absolute right-0 mt-2 w-48 rounded-xl bg-slate-900 border border-slate-800 shadow-2xl p-1.5 z-40"
                 style="display: none;">
                
                <div class="px-3 py-2 border-b border-slate-800/60 sm:hidden">
                    <p class="text-xs font-semibold text-white truncate">
                        {% if request.user.is_authenticated %}{{ request.user.username }}{% else %}System Admin{% endif %}
                    </p>
                    <p class="text-[10px] text-slate-500 font-mono truncate">Portfolio Auditor</p>
                </div>

                <a href="{% url 'profile_view' %}" class="flex items-center gap-2.5 w-full px-3 py-2 text-xs font-medium text-slate-300 hover:text-white hover:bg-slate-800/60 rounded-lg transition">
                    <i data-lucide="settings" class="size-3.5 text-slate-400"></i>
                    <span>Profile Settings</span>
                </a>

                <a href="/admin/" class="flex items-center gap-2.5 w-full px-3 py-2 text-xs font-medium text-slate-300 hover:text-white hover:bg-slate-800/60 rounded-lg transition">
                    <i data-lucide="shield" class="size-3.5 text-slate-400"></i>
                    <span>System Admin</span>
                </a>

                <div class="h-px bg-slate-800/60 my-1"></div>

            <form method="POST" action="{% url 'account_logout' %}" class="block w-full">
                {% csrf_token %}
                <button type="submit" class="flex items-center gap-2.5 w-full px-3 py-2 text-xs font-medium text-rose-400 hover:text-rose-300 hover:bg-rose-500/10 rounded-lg transition text-left w-full">
                    <i data-lucide="log-out" class="size-3.5"></i>
                    <span>Log Out Account</span>
                </button>
            </form>

            </div>
        </div>
    </div>
</header>

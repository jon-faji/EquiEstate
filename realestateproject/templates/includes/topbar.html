{% load static %}
<header class="h-16 bg-slate-900/50 border-b border-slate-800/80 backdrop-blur-sm flex items-center justify-between px-6 shrink-0 sticky top-0 z-10">
    <div class="flex items-center space-x-2">
        <span class="text-xs font-medium text-slate-400 bg-slate-800 px-2.5 py-1 rounded-md border border-slate-700/60">v1.0.0 Stable</span>
    </div>

    <div class="flex items-center space-x-4">
        <div class="p-2 text-slate-400 hover:text-white transition rounded-lg cursor-pointer hover:bg-slate-800/40">
            <i data-lucide="moon" class="w-4 h-4 text-indigo-400"></i>
        </div>
        
        <div class="h-4 w-px bg-slate-800"></div>

        <div class="flex items-center space-x-3">
            <div class="text-right hidden sm:block">
                <p class="text-xs font-semibold text-white tracking-tight">System Admin</p>
                <p class="text-xxs text-slate-400 font-mono">Portfolio Auditor</p>
            </div>
            <img src="{% static 'img/placeholder-user.jpg' %}" alt="Avatar" class="h-8 w-8 rounded-full border border-slate-700 object-cover shadow-sm">
        </div>
    </div>
</header>

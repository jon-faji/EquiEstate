{% for field in form %}
<div class="flex flex-col gap-1.5 mb-4">
    <label for="{{ field.id_for_label }}" class="text-sm font-semibold text-slate-300">
        {{ field.label }}
    </label>
    <div class="relative">
        {# Dynamically injecting Tailwind styling variables into generic Django form fields #}
        {{ field }}
    </div>
    {% if field.help_text %}
    <p class="text-xs text-slate-500 mt-0.5">{{ field.help_text }}</p>
    {% endif %}
    {% for error in field.errors %}
    <p class="text-xs text-rose-500 mt-1 font-medium flex items-center gap-1">
        <span>⚠</span> {{ error }}
    </p>
    {% endfor %}
</div>
{% endfor %}

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const textInputs = document.querySelectorAll('input[type="text"], input[type="email"], input[type="number"], select, textarea');
        textInputs.forEach(input => {
            input.className = "w-full bg-slate-950 border border-slate-800 text-slate-100 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition duration-150";
        });
        const checkboxes = document.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(box => {
            box.className = "rounded bg-slate-950 border-slate-800 text-indigo-600 focus:ring-indigo-500 focus:ring-offset-slate-900";
        });
    });
</script>

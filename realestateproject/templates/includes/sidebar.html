{% load static %}
<aside class="bg-sidebar-gradient text-white flex flex-col h-screen w-52 shrink-0 border-r border-white/5" aria-label="Primary navigation">
  
  <div class="flex items-center justify-between gap-2 px-4 py-5">
    <div class="flex items-center gap-2">
      <div class="size-9 rounded-xl bg-white/20 grid place-items-center font-bold text-sm tracking-tight text-white shadow-inner">EE</div>
      <span class="block text-sm font-semibold tracking-wide text-white">EquiEstate</span>
    </div>
  </div>

  <nav class="mt-2 flex-1">
    <ul class="flex flex-col gap-1 px-3">
      
      <li>
        <a href="{% url 'home' %}" 
           class="group flex items-center gap-3 rounded-xl px-3 py-3 transition-colors {% if request.path == '/' %} bg-white text-indigo-600 font-medium {% else %} text-white/90 hover:bg-white/10 {% endif %}">
          <i data-lucide="home" class="size-5 {% if request.path == '/' %} text-indigo-600 {% else %} text-white {% endif %}"></i>
          <span class="text-sm">Home Summary</span>
        </a>
      </li>

      <li>
        <a href="{% url 'properties_view' %}" 
           class="group flex items-center gap-3 rounded-xl px-3 py-3 transition-colors {% if '/properties/' in request.path %} bg-white text-indigo-600 font-medium {% else %} text-white/90 hover:bg-white/10 {% endif %}">
          <i data-lucide="building-2" class="size-5 {% if '/properties/' in request.path %} text-indigo-600 {% else %} text-white {% endif %}"></i>
          <span class="text-sm">Properties</span>
        </a>
      </li>

      <li>
        <a href="{% url 'tenants_view' %}" 
           class="group flex items-center gap-3 rounded-xl px-3 py-3 transition-colors {% if '/tenants/' in request.path %} bg-white text-indigo-600 font-medium {% else %} text-white/90 hover:bg-white/10 {% endif %}">
          <i data-lucide="user-round" class="size-5 {% if '/tenants/' in request.path %} text-indigo-600 {% else %} text-white {% endif %}"></i>
          <span class="text-sm">Tenants Registry</span>
        </a>
      </li>

      <li>
        <a href="{% url 'ledger_view' %}" 
           class="group flex items-center gap-3 rounded-xl px-3 py-3 transition-colors {% if '/ledger/' in request.path %} bg-white text-indigo-600 font-medium {% else %} text-white/90 hover:bg-white/10 {% endif %}">
          <i data-lucide="bar-chart-3" class="size-5 {% if '/ledger/' in request.path %} text-indigo-600 {% else %} text-white {% endif %}"></i>
          <span class="text-sm">Financial Ledger</span>
        </a>
      </li>

      <li>
        <a href="{% url 'statistics_view' %}" 
           class="group flex items-center gap-3 rounded-xl px-3 py-3 transition-colors {% if '/statistics/' in request.path %} bg-white text-indigo-600 font-medium {% else %} text-white/90 hover:bg-white/10 {% endif %}">
          <i data-lucide="bar-chart-3" class="size-5 {% if '/statistics/' in request.path %} text-indigo-600 {% else %} text-white {% endif %}"></i>
          <span class="text-sm">Statistics</span>
        </a>
      </li>

      <li>
        <a href="{% url 'profile_view' %}" 
           class="group flex items-center gap-3 rounded-xl px-3 py-3 transition-colors {% if '/profile/' in request.path %} bg-white text-indigo-600 font-medium {% else %} text-white/90 hover:bg-white/10 {% endif %}">
          <i data-lucide="user-round" class="size-5 {% if '/profile/' in request.path %} text-indigo-600 {% else %} text-white {% endif %}"></i>
          <span class="text-sm">Profile Settings</span>
        </a>
      </li>

      <li>
        <a href="/admin/" 
           class="group flex items-center gap-3 rounded-xl px-3 py-3 text-white/90 hover:bg-white/10 transition-colors">
          <i data-lucide="shield" class="size-5 text-white"></i>
          <span class="text-sm">System Database</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="px-3 pb-5 pt-2">
    <div class="rounded-2xl bg-white/10 p-4 border border-white/5">
      <p class="text-xs leading-5 text-white/80 font-medium">Control your portfolio dataset logs with ease.</p>
    </div>
  </div>

</aside>

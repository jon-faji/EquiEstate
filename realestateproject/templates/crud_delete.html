{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen bg-slate-950 text-slate-100 p-4 md:p-6 flex items-start justify-start">
    <div class="w-full max-w-lg bg-slate-900 border border-rose-950/40 rounded-2xl overflow-hidden shadow-2xl">
        <div class="h-1.5 bg-rose-600"></div>
        <div class="p-6 space-y-6">
            <div>
                <h3 class="text-xl font-bold text-white tracking-tight flex items-center gap-2">
                    <i data-lucide="alert-triangle" class="text-rose-500 size-6"></i>
                    <span>Confirm Record Erasure</span>
                </h3>
                <p class="text-sm text-slate-400 mt-2">
                    Are you absolutely sure you want to permanently strip out the item container for <strong class="text-white font-bold">"{{ object }}"</strong>? This action cannot be reversed.
                </p>
            </div>

            <form method="post" novalidate>
                {% csrf_token %}
                <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-800/80">
                    <a href="../" class="px-4 py-2.5 rounded-xl border border-slate-800 text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-850 transition duration-150">
                        Abort Action
                    </a>
                    <button type="submit" class="bg-rose-600 hover:bg-rose-500 text-white font-semibold text-sm px-5 py-2.5 rounded-xl shadow-md transition duration-150">
                        Confirm Delete
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

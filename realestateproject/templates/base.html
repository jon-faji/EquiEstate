{% load static %}
{% load pwa %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EquiEstate Engine{% endblock %}</title>
    
    {% progressive_web_app_meta %}
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#4f46e5',
                    },
                    backgroundImage: {
                        'sidebar-gradient': 'linear-gradient(135deg, #1e1b4b 0%, #311042 100%)',
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="{% static 'css/globals.css' %}">
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 antialiased">

    <div class="flex min-h-screen overflow-hidden relative">
        
        {% include 'includes/sidebar.html' %}

        <div id="main-content-wrapper" class="flex-1 flex flex-col min-w-0 overflow-y-auto transition-all duration-300">
            
            {% include 'includes/topbar.html' %}

            <div class="p-4 md:p-8">
                {% block content %}
                {% endblock %}
            </div>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sidebar = document.getElementById("main-sidebar");
            const openBtn = document.getElementById("sidebar-open-btn");
            const closeBtn = document.getElementById("sidebar-close-btn");
            const overlay = document.getElementById("sidebar-overlay");
            const contentWrapper = document.getElementById("main-content-wrapper");

            if (!sidebar || !openBtn || !closeBtn || !overlay) {
                lucide.createIcons();
                return;
            }

            function closeSidebar() {
                sidebar.classList.add("-translate-x-full");
                sidebar.classList.add("lg:-mr-64"); 
                openBtn.classList.remove("hidden");
                overlay.classList.add("opacity-0", "pointer-events-none");
                localStorage.setItem("sidebarState", "hidden");
            }

            function openSidebar() {
                sidebar.classList.remove("-translate-x-full", "lg:-mr-64");
                openBtn.classList.add("hidden");
                if (window.innerWidth < 1024) {
                    overlay.classList.remove("opacity-0", "pointer-events-none");
                }
                localStorage.setItem("sidebarState", "visible");
            }

            closeBtn.addEventListener("click", closeSidebar);
            openBtn.addEventListener("click", openSidebar);
            overlay.addEventListener("click", closeSidebar);

            const savedState = localStorage.getItem("sidebarState");
            
            if (savedState === "hidden") {
                sidebar.classList.add("transition-none", "-translate-x-full", "lg:-mr-64");
                openBtn.classList.remove("hidden");
                sidebar.offsetHeight; 
                sidebar.classList.remove("transition-none");
            } else if (window.innerWidth < 1024) {
                closeSidebar();
            }

            lucide.createIcons();
        });
    </script>
</body>
</html>

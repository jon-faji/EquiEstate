{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Security Authorization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-950 text-slate-100 antialiased flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-sm bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-6 text-center">
        <div class="inline-flex items-center justify-center size-12 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-indigo-400 mb-4 animate-pulse">
            <i data-lucide="shield-check" class="size-6"></i>
        </div>
        
        <h3 class="text-lg font-bold text-white tracking-tight mb-2">Verify Authorization</h3>
        <p class="text-xs text-slate-400 leading-relaxed mb-6">
            You are initiating an administrative secure login workflow via provider: <strong class="text-slate-200 font-semibold">{{ provider.name }}</strong>.
        </p>

        <form method="post" class="space-y-2">
            {% csrf_token %}
            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-sm py-2.5 rounded-xl shadow transition duration-150">
                Authorize Session
            </button>
        </form>
        
        <a href="{% url 'account_login' %}" class="block w-full mt-2 bg-slate-950 border border-slate-800 text-slate-400 hover:text-white hover:bg-slate-850 font-semibold text-sm py-2.5 rounded-xl transition">
            Terminate Request
        </a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => { lucide.createIcons(); });
    </script>
</body>
</html>
